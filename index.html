<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Luftkvalitet">
<meta name="theme-color" content="#0a0f0a">
<title>Luftkvalitet – Fornebu & Oslo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0a0f0a;--surface:#131a13;--surface2:#1a231a;--border:rgba(255,255,255,0.07);--text:#e8f0e8;--muted:#6a7f6a;--dim:#3a4a3a;--c1:#4ade80;--c2:#fb923c;--c3:#f87171;--c4:#c084fc;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;height:100%;overflow:hidden;position:relative;}
#app{display:flex;flex-direction:column;height:100%;padding-top:calc(var(--safe-top) + 8px);padding-bottom:calc(var(--safe-bot) + 8px);}
.hdr{padding:12px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:13px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.hdr-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);}
.zones{display:flex;gap:6px;overflow-x:auto;padding:4px 20px 10px;scrollbar-width:none;}
.zones::-webkit-scrollbar{display:none;}
.zone-pill{flex-shrink:0;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.zone-pill.active{background:var(--surface2);border-color:rgba(255,255,255,0.18);color:var(--text);}
.stations{overflow-y:auto;flex:1;padding:0 12px;scrollbar-width:none;}
.stations::-webkit-scrollbar{display:none;}
.station-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:14px;}
.station-card:active{background:var(--surface2);}
.idx-badge{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;flex-shrink:0;font-family:'DM Mono',monospace;}
.idx-1{background:rgba(74,222,128,.12);color:var(--c1);}
.idx-2{background:rgba(251,146,60,.12);color:var(--c2);}
.idx-3{background:rgba(248,113,113,.12);color:var(--c3);}
.idx-4{background:rgba(192,132,252,.12);color:var(--c4);}
.st-info{flex:1;min-width:0;}
.st-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.st-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.st-dist{font-size:11px;color:var(--dim);margin-top:1px;}
.st-chevron{color:var(--dim);font-size:14px;}
.detail-overlay{position:fixed;inset:0;background:var(--bg);z-index:10;display:flex;flex-direction:column;padding-top:calc(var(--safe-top) + 8px);padding-bottom:calc(var(--safe-bot) + 8px);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.detail-overlay.open{transform:translateY(0);}
.detail-hdr{display:flex;align-items:center;gap:10px;padding:10px 20px 14px;}
.back-btn{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:16px;}
.detail-name{font-size:16px;font-weight:500;flex:1;}
.detail-scroll{flex:1;overflow-y:auto;padding:0 16px;scrollbar-width:none;}
.detail-scroll::-webkit-scrollbar{display:none;}
.big-idx{text-align:center;padding:20px 0 16px;}
.big-num{font-family:'DM Mono',monospace;font-size:72px;font-weight:400;line-height:1;}
.big-label{font-size:22px;font-weight:500;margin-top:6px;}
.big-short{font-size:13px;color:var(--muted);margin-top:4px;}
.advice{border-radius:12px;padding:12px 14px;margin:4px 0 12px;font-size:14px;line-height:1.65;}
.advice-lbl{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;margin-bottom:5px;}
.params{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.param{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;}
.param-lbl{font-size:11px;color:var(--muted);}
.param-val{font-size:22px;font-family:'DM Mono',monospace;font-weight:400;margin-top:2px;}
.param-unit{font-size:11px;color:var(--muted);}
.pbar-bg{height:3px;background:var(--dim);border-radius:2px;margin-top:6px;}
.pbar{height:3px;border-radius:2px;transition:width .5s ease;}
.chart-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px;}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.chart-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.comp-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.comp-tab{padding:3px 8px;border-radius:6px;font-size:11px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .1s;}
.comp-tab.active{background:var(--surface2);border-color:rgba(255,255,255,0.2);color:var(--text);}
.chart-wrap{position:relative;width:100%;height:140px;}
.loading-msg{text-align:center;padding:40px;color:var(--muted);font-size:14px;}
.err-box{background:var(--surface);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:16px;margin:12px;font-size:12px;color:var(--c3);line-height:1.8;}
.retry-btn{display:block;margin-top:12px;padding:8px 16px;border-radius:8px;border:1px solid var(--c1);color:var(--c1);background:transparent;font-size:13px;cursor:pointer;width:100%;font-family:sans-serif;}
.dot-anim::after{content:'';animation:dots 1.2s steps(3,end) infinite;}
@keyframes dots{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.install-hint{margin:0 12px 8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;}
.install-hint.hide{display:none;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="hdr-title">Luftkvalitet</span>
    <span class="hdr-time" id="clock">--:--</span>
  </div>
  <div class="install-hint hide" id="hint">
    <span>Trykk Del &rarr; Legg til p&aring; hjemskjerm for app-opplevelse</span>
    <span style="cursor:pointer;padding-left:8px;" onclick="document.getElementById('hint').classList.add('hide')">&#10005;</span>
  </div>
  <div class="zones" id="zones"></div>
  <div class="stations" id="stations">
    <div class="loading-msg"><span class="dot-anim">Henter data</span></div>
  </div>
</div>

<div class="detail-overlay" id="detail">
  <div class="detail-hdr">
    <div class="back-btn" onclick="closeDetail()">&#8592;</div>
    <span class="detail-name" id="d-name">--</span>
  </div>
  <div class="detail-scroll" id="detail-scroll"></div>
</div>

<script>
const FORNEBU_LAT = 59.895;
const FORNEBU_LON = 10.605;
const FORNEBU_RADIUS_KM = 5;

const IDX = {
  1: { label: 'Lite forurensning', short: 'Liten helserisiko', color: 'var(--c1)', bg: 'rgba(74,222,128,.08)', advice: 'Utendørs aktivitet anbefales for alle.' },
  2: { label: 'Moderat', short: 'Moderat helserisiko', color: 'var(--c2)', bg: 'rgba(251,146,60,.08)', advice: 'Utendørsaktivitet anbefales for de fleste. Sensitive bør unngå intensiv aktivitet nær trafikk.' },
  3: { label: 'Høy', short: 'Betydelig helserisiko', color: 'var(--c3)', bg: 'rgba(248,113,113,.08)', advice: 'Barn med luftveislidelser og voksne med hjerte-/karsykdommer bør redusere utendørsaktivitet.' },
  4: { label: 'Svært høy', short: 'Alvorlig helserisiko', color: 'var(--c4)', bg: 'rgba(192,132,252,.08)', advice: 'Alle med hjerte-/karsykdommer eller luftveislidelser bør unngå utendørsaktivitet.' }
};

const COMP_MAX = { 'PM2.5': 75, 'PM10': 100, 'NO2': 400, 'NO': 200, 'O3': 240, 'SO2': 350, 'CO': 20 };
const COMP_ORDER = ['PM2.5', 'PM10', 'NO2', 'NO', 'O3', 'SO2', 'CO'];
const IDX_CHART = { 1: '#4ade80', 2: '#fb923c', 3: '#f87171', 4: '#c084fc' };

let allData = [], histChart = null;

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function distToFornebu(row) {
  if (!row.latitude || !row.longitude) return 999;
  return haversineKm(FORNEBU_LAT, FORNEBU_LON, row.latitude, row.longitude);
}

function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 10000);

const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
if (isIOS && !window.navigator.standalone) document.getElementById('hint').classList.remove('hide');

function showErr(msg) {
  document.getElementById('stations').innerHTML = `<div class="err-box"><strong style="font-family:sans-serif;font-size:13px">Feil ved lasting av data</strong><br><br>${msg}<br><button class="retry-btn" onclick="init()">Prøv igjen</button></div>`;
}

async function apiFetch(path) {
  const r = await fetch('/api/' + path);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function init() {
  document.getElementById('stations').innerHTML = '<div class="loading-msg"><span class="dot-anim">Henter data</span></div>';
  try {
    allData = await apiFetch('aq-current');
    if (!Array.isArray(allData) || allData.length === 0) throw new Error('Ingen data mottatt');

    allData.forEach(r => {
      r._dist = distToFornebu(r);
      r._nearFornebu = r._dist <= FORNEBU_RADIUS_KM;
    });

    const zoneNames = ['Nær Fornebu', 'Bærum', 'Oslo', 'Alle'];
    const zEl = document.getElementById('zones');
    zEl.innerHTML = zoneNames.map(z => `<div class="zone-pill${z === 'Nær Fornebu' ? ' active' : ''}" onclick="setZone('${z}')">${z}</div>`).join('');
    renderList('Nær Fornebu');
  } catch (e) {
    showErr(e.message);
  }
}

function setZone(z) {
  document.querySelectorAll('.zone-pill').forEach(el => el.classList.toggle('active', el.textContent === z));
  renderList(z);
}

function stationsForZone(zone) {
  let filtered = allData;
  if (zone === 'Nær Fornebu') filtered = allData.filter(r => r._nearFornebu);
  else if (zone === 'Bærum') filtered = allData.filter(r => (r.municipality || '').toLowerCase().includes('bærum'));
  else if (zone === 'Oslo') filtered = allData.filter(r => (r.municipality || '').toLowerCase().includes('oslo'));
  return [...filtered].sort((a, b) => a._dist - b._dist);
}

function renderList(zone) {
  const sts = stationsForZone(zone);
  if (!sts.length) {
    document.getElementById('stations').innerHTML = '<div class="loading-msg">Ingen stasjoner funnet i dette området</div>';
    return;
  }
  document.getElementById('stations').innerHTML = sts.map(r => {
    const idx = Math.min(4, Math.max(1, r.index || 1));
    const distTxt = r._dist < 999 ? `${r._dist.toFixed(1)} km fra Fornebu` : '';
    return `<div class="station-card" onclick="openDetail('${r.eoi}')">
      <div class="idx-badge idx-${idx}">${idx}</div>
      <div class="st-info">
        <div class="st-name">${r.station}</div>
        <div class="st-sub">${r.municipality || ''} · ${r.area || ''}</div>
        ${distTxt ? `<div class="st-dist">${distTxt}</div>` : ''}
      </div>
      <span class="st-chevron">›</span>
    </div>`;
  }).join('');
}

function findStation(eoi) {
  return allData.find(r => r.eoi === eoi);
}

async function openDetail(eoi) {
  const st = findStation(eoi);
  if (!st) return;

  document.getElementById('d-name').textContent = st.station;
  document.getElementById('detail-scroll').innerHTML = '<div class="loading-msg"><span class="dot-anim">Henter prognose</span></div>';
  document.getElementById('detail').classList.add('open');

  const idx = Math.min(4, Math.max(1, st.index || 1));
  const info = IDX[idx] || IDX[1];

  const comps = st.components || [];
  const sorted = [...comps].sort((a, b) => {
    const ai = COMP_ORDER.indexOf(a.component), bi = COMP_ORDER.indexOf(b.component);
    return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
  });

  const paramsHtml = sorted.map(r => {
    const pct = Math.min(100, Math.round((r.value / (COMP_MAX[r.component] || 100)) * 100));
    const c = IDX_CHART[Math.min(4, Math.max(1, r.index))] || '#4ade80';
    return `<div class="param"><div class="param-lbl">${r.component}</div><div class="param-val">${r.value.toFixed(1)} <span class="param-unit">${r.unit}</span></div><div class="pbar-bg"><div class="pbar" style="width:${pct}%;background:${c};"></div></div></div>`;
  }).join('');

  const compList = sorted.map(r => r.component);

  document.getElementById('detail-scroll').innerHTML = `
    <div class="big-idx">
      <div class="big-num" style="color:${info.color}">${idx}</div>
      <div class="big-label" style="color:${info.color}">${info.label}</div>
      <div class="big-short">${info.short}</div>
    </div>
    <div class="advice" style="background:${info.bg}">
      <div class="advice-lbl" style="color:${info.color}">Anbefaling</div>
      <span style="color:${info.color}">${info.advice}</span>
    </div>
    <div class="params">${paramsHtml}</div>
    <div class="chart-section">
      <div class="chart-hdr">
        <span class="chart-title">Prognose neste 24 timer</span>
        <div class="comp-tabs" id="comp-tabs">
          ${compList.map((c, i) => `<button class="comp-tab${i === 0 ? ' active' : ''}" onclick="switchComp('${c}',this)">${c}</button>`).join('')}
        </div>
      </div>
      <div class="chart-wrap"><canvas id="hchart"></canvas></div>
      <div id="hist-err" style="font-size:11px;color:var(--muted);margin-top:6px;"></div>
    </div>`;

  if (compList.length) loadForecast(eoi, compList[0]);
}

async function loadForecast(eoi, comp) {
  try {
    const data = await apiFetch(`aq-history?station=${encodeURIComponent(eoi)}`);
    window._forecastData = data;
    drawChart(comp);
  } catch (e) {
    const el = document.getElementById('hist-err');
    if (el) el.textContent = 'Kunne ikke laste prognose: ' + e.message;
  }
}

function switchComp(comp, btn) {
  document.querySelectorAll('.comp-tab').forEach(b => b.classList.toggle('active', b === btn));
  drawChart(comp);
}

function drawChart(comp) {
  if (typeof Chart === 'undefined') return;
  const data = window._forecastData;
  if (!Array.isArray(data)) return;

  const vals = data.filter(v => v.component === comp && v.isValid);
  if (!vals.length) return;

  const labels = vals.map(v => new Date(v.time).toLocaleTimeString('nb-NO', { hour: '2-digit', minute: '2-digit' }));
  const values = vals.map(v => Math.round(v.value * 10) / 10);
  const bgs = vals.map(v => `${IDX_CHART[Math.min(4, Math.max(1, v.index))] || '#4ade80'}22`);
  const borders = vals.map(v => IDX_CHART[Math.min(4, Math.max(1, v.index))] || '#4ade80');

  if (histChart) { histChart.destroy(); histChart = null; }
  const ctx = document.getElementById('hchart');
  if (!ctx) return;

  histChart = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: bgs, borderColor: borders, borderWidth: 1.5, borderRadius: 3 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.parsed.y} ${vals[0]?.unit || ''}` } } },
      scales: {
        x: { ticks: { color: '#6a7f6a', font: { size: 9 }, maxTicksLimit: 8, maxRotation: 0 }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y: { ticks: { color: '#6a7f6a', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' }, title: { display: true, text: vals[0]?.unit || '', color: '#6a7f6a', font: { size: 9 } } }
      }
    }
  });
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  if (histChart) { histChart.destroy(); histChart = null; }
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
  onload="init();"
  onerror="init();"
></script>
</body>
</html>
